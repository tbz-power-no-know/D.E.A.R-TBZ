<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/logo.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Lora:wght@600;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style/reset.css" />
    <link rel="stylesheet" href="style/main.css" />
    <link rel="stylesheet" href="style/about.css" />
    <script type="module" src="/js/main.js"></script>
    <title>D.E.A.R — About</title>
  </head>
  <body>
    <main>
      <section class="about-section">
        <h2>About D.E.A.R</h2>
        <p>
          D.E.A.R. stands for "Drop Everything And Read". This project showcases
          book presentations produced as podcasts by students in ABU (General
          Education) classes.
        </p>
      </section>

      <section class="contact-section">
        <h2>Contact Us</h2>
        <form class="contact-form" action="#" method="POST" novalidate>
          <!-- Honeypot: hidden from users, catches bots that fill every field -->
          <input
            type="text"
            class="hp-field"
            name="company"
            tabindex="-1"
            autocomplete="off"
            aria-hidden="true"
          />

          <div class="form-group">
            <label for="contact-name">Name</label>
            <input type="text" id="contact-name" name="name" required />
          </div>

          <div class="form-group">
            <label for="contact-email">Email</label>
            <input type="email" id="contact-email" name="email" required />
          </div>

          <div class="form-group">
            <label for="contact-subject">Subject</label>
            <select id="contact-subject" name="subject" required>
              <option value="" disabled selected>Select a subject</option>
              <option value="feedback">Feedback</option>
              <option value="technical">Technical Issue</option>
              <option value="recommendation">Book Recommendation</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="contact-message">Message</label>
            <textarea
              id="contact-message"
              style="resize: none"
              name="message"
              rows="5"
              required
            ></textarea>
          </div>

          <button type="submit" class="submit-btn">Send</button>

          <p class="form-status" role="status" aria-live="polite"></p>
        </form>
      </section>
    </main>
  </body>
</html>
