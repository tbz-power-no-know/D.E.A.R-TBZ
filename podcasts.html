<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Lora:wght@600;700;900&display=swap" rel="stylesheet" />
    <title>D.E.A.R — Podcasts</title>
    <script type="module" crossorigin src="/D.E.A.R-TBZ/assets/main-CnRA2KZK.js"></script>
    <link rel="stylesheet" crossorigin href="/D.E.A.R-TBZ/assets/main-C_nGUHMJ.css">
    <link rel="stylesheet" crossorigin href="/D.E.A.R-TBZ/assets/podcasts-hkjmhKEn.css">
  </head>
  <body>
    <main>
      <section class="search-section">
        <input type="text" id="search-input" class="search-input" placeholder="Search podcasts..." aria-label="Search podcasts" />
      </section>

      <section class="sort-section">
        <button id="sort-toggle" class="sort-btn" aria-label="Toggle sort order">Newest first</button>
      </section>

      <section class="filter-section">
        <div id="filter-buttons" class="filter-buttons">
          <button class="filter-btn active" data-category="all">All</button>
        </div>
      </section>

      <section class="podcasts-section">
        <div id="podcasts-grid" class="podcasts-grid">
          <p class="loading-text">Loading podcasts...</p>
        </div>
      </section>
    </main>
  </body>
</html>
